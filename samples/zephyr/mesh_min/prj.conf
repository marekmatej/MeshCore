# Minimal MeshCore sample configuration.

# Pull in and build the MeshCore library.
CONFIG_MESHCORE=y
CONFIG_MESHCORE_ARDUINO_COMPAT=y
CONFIG_MESHCORE_ZEPHYR_HELPERS=y

# No external radio in this sample.
CONFIG_MESHCORE_RADIOLIB=n

# C++ runtime.
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# Randomness for the RNG binding.
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Console / logging.
CONFIG_PRINTK=y
CONFIG_LOG=y

# Reasonable stack/heap headroom for the mesh engine.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
